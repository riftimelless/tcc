<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universidades - Faculda+</title>
  <link rel="stylesheet" href="universidades-style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <button onclick="window.history.back()" class="back-btn">←</button>
      <h1>Universidades</h1>
      <div></div> <!-- espaço vazio para alinhar -->
    </header>

    <!-- Lista de Universidades -->
    <div class="university-card">
        <img src="https://portal.unila.edu.br/noticias/10-fatos-que-marcaram-os-10-anos-da-unila/09.png" alt="Campus Unila">
        <div class="info">
          <h3>Unila</h3>
          <p>Universidade Federal da Integração Latino-Americana</p>
        </div>
      </div>

      <div class="university-card">
        <img src="https://via.placeholder.com/600x300/ef4444/ffffff?text=IFPR" alt="IFPR">
        <div class="info">
          <h3>IFPR</h3>
          <p>Instituto Federal do Paraná</p>
        </div>
      </div>

      <div class="university-card">
        <img src="https://via.placeholder.com/600x300/dc2626/ffffff?text=PUCPR" alt="PUCPR">
        <div class="info">
          <h3>PUCPR</h3>
          <p>Pontifícia Universidade Católica do Paraná</p>
        </div>
      </div>
    </div>

  </div>

  <script src="universidades-script.js"></script>
</body>
</html>
