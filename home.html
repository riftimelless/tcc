<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculda+ - Home</title>
  <link rel="stylesheet" href="home-style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="https://via.placeholder.com/40x40/2f5bd3/ffffff?text=🎓" alt="Faculda+">
        <span>Faculda+</span>
      </div>
      <button class="menu-btn">☰</button>
    </header>

    <!-- Barra de busca -->
    <div class="search-container">
      <input type="text" placeholder="No que está pensando? " class="search-bar" />
    </div>

    <!-- Cards de categorias -->
    <div class="categories">
      
      <div class="category-card">
        <img src="https://www.fecomerciopr.com.br/wp-content/uploads/2019/11/Fachada-Senac-Sao-Jose-dos-Pinhais-Foto-Bruno-Tadashi.jpg" alt="Cursos">
        <div class="card-overlay">
          <h3>Cursos</h3>
        </div>
      </div>

      <div class="category-card" onclick="window.location.href='universidades.html'">
        <img src="https://direito.ufpr.br/wp-content/uploads/2022/07/Nova_fachada-scaled-1000x800.jpg" alt="Universidades">
        <div class="card-overlay">
          <h3>Universidades</h3>
        </div>
      </div>

      <div class="category-card">
        <img src="https://s2-pipelinevalor.glbimg.com/U6YsT19pwgZHBJvG_UgG1FAl3fw=/0x0:2480x1473/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_b3309463db95468aa275bd532137e960/internal_photos/bs/2024/I/q/b1yPjXT1GphvvBLGnx0Q/sedesaneparike170412.jpg" alt="Programas">
        <div class="card-overlay">
          <h3>Programas</h3>
        </div>
      </div>

    </div>

  </div>

  <script src="home-script.js"></script>
</body>
</html>
